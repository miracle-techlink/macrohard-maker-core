# Klipper 最简仿真配置 — 无加热器/温度传感器
[mcu]
serial: /tmp/klipper_host_mcu

[stepper_x]
step_pin: mcu:gpio0
dir_pin: mcu:gpio1
enable_pin: !mcu:gpio2
microsteps: 16
rotation_distance: 40
endstop_pin: mcu:gpio3
position_min: 0
position_max: 300
position_endstop: 0
homing_speed: 50

[stepper_y]
step_pin: mcu:gpio4
dir_pin: mcu:gpio5
enable_pin: !mcu:gpio6
microsteps: 16
rotation_distance: 360
endstop_pin: mcu:gpio7
position_min: -99999
position_max: 99999
position_endstop: 0
homing_speed: 30
homing_positive_dir: False

[stepper_z]
step_pin: mcu:gpio8
dir_pin: mcu:gpio9
enable_pin: !mcu:gpio10
microsteps: 16
rotation_distance: 8
endstop_pin: mcu:gpio11
position_min: -2
position_max: 350
position_endstop: 0
homing_speed: 10

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1500
max_z_velocity: 10
max_z_accel: 100

[virtual_sdcard]
path: /tmp/klipper_gcode

[gcode_macro T0]
gcode:
    RESPOND MSG="T0: Plastic"

[gcode_macro T1]
gcode:
    RESPOND MSG="T1: Fiber"

[gcode_macro M700]
gcode:
    RESPOND MSG="Tension set"

[gcode_macro M701]
gcode:
    RESPOND MSG="Fiber CUT"

[gcode_macro M702]
gcode:
    RESPOND MSG="Vf set"

[respond]
