# ============================================================
# Klipper 配置文件 — 侧向沉积连续碳纤维3D打印机
# CF-Path-Planner XZ+Y(rotation) 三轴打印机
# ============================================================
#
# 坐标系：
#   X = 径向（打印头水平移动，靠近/远离工件）
#   Y = 旋转轴（工件平台360°连续旋转）← 课题要求的连续循环轴
#   Z = 高度（打印头垂直移动）
#
# 打印流程：
#   1. 工件固定在Y轴旋转平台上
#   2. 打印头在XZ平面移动
#   3. Y轴连续旋转，纤维螺旋缠绕在工件表面
#

[mcu]
serial: /dev/serial/by-id/usb-CHANGE_THIS_TO_YOUR_MCU
# 根据实际主控板修改，例如：
# serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_xxx

# ============================================================
# X轴 — 打印头径向（水平直线轴）
# ============================================================
[stepper_x]
step_pin: CHANGE_ME
dir_pin: CHANGE_ME
enable_pin: !CHANGE_ME
microsteps: 16
rotation_distance: 40          # mm per revolution (典型: 2GT皮带 20齿 * 2mm)
endstop_pin: ^CHANGE_ME
position_min: 0
position_max: 300              # 径向行程 300mm
position_endstop: 0
homing_speed: 50

# ============================================================
# Y轴 — 旋转平台（连续循环轴）
# ============================================================
# 关键配置：rotation_distance = 360 表示电机转一圈 = 工件转360°
# Klipper 会将 Y 坐标解释为角度（度）
# G-code 中 Y720 表示工件从当前位置再转720° = 2圈
#
[stepper_y]
step_pin: CHANGE_ME
dir_pin: CHANGE_ME
enable_pin: !CHANGE_ME
microsteps: 16
rotation_distance: 360         # ← 关键：360° per motor revolution
                               #   如果有减速比，改为 360/减速比
                               #   例如 10:1 减速 → rotation_distance: 36
gear_ratio: 10:1               # 如果有减速齿轮，在此设置
                               # 删除此行如果是直驱
endstop_pin: ^CHANGE_ME        # 原点传感器（可选，用于对零）
position_min: -99999           # 连续旋转，不限位
position_max: 99999            # 允许多圈累积角度
position_endstop: 0
homing_speed: 30

# ============================================================
# Z轴 — 打印头高度（垂直直线轴）
# ============================================================
[stepper_z]
step_pin: CHANGE_ME
dir_pin: CHANGE_ME
enable_pin: !CHANGE_ME
microsteps: 16
rotation_distance: 8           # mm per revolution (典型: T8丝杆 导程8mm)
endstop_pin: ^CHANGE_ME
position_min: -2               # 允许略低于零点
position_max: 350              # 垂直行程 350mm
position_endstop: 0
homing_speed: 10

# ============================================================
# 挤出机 T0 — 普通塑料（PA6/Onyx）
# ============================================================
[extruder]
step_pin: CHANGE_ME
dir_pin: CHANGE_ME
enable_pin: !CHANGE_ME
microsteps: 16
rotation_distance: 7.5         # 根据实际挤出轮直径校准
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: CHANGE_ME
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: CHANGE_ME
min_temp: 0
max_temp: 300
max_extrude_cross_section: 5.0
# PID 参数（需实际校准）
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114.0

# ============================================================
# 挤出机 T1 — 连续碳纤维共挤出头
# ============================================================
# 注意：CF打印头不使用传统挤出机构
# 纤维通过张力系统送入，用 M700 T{tension} 控制张力
# 用 M701 剪切纤维
#
# 如果硬件上CF头有独立加热器：
#[extruder1]
#step_pin: CHANGE_ME
#dir_pin: CHANGE_ME
#enable_pin: !CHANGE_ME
#microsteps: 16
#rotation_distance: 7.5
#nozzle_diameter: 0.800        # CF喷嘴通常更大
#filament_diameter: 1.000      # CF预浸丝直径
#heater_pin: CHANGE_ME
#sensor_type: ATC Semitec 104NT-4-R025H42G
#sensor_pin: CHANGE_ME
#min_temp: 0
#max_temp: 350

# ============================================================
# 热床
# ============================================================
[heater_bed]
heater_pin: CHANGE_ME
sensor_type: EPCOS 100K B57560G104F
sensor_pin: CHANGE_ME
min_temp: 0
max_temp: 120
#control: pid
#pid_Kp: 54.0
#pid_Ki: 0.8
#pid_Kd: 500.0

# ============================================================
# 风扇
# ============================================================
[fan]
pin: CHANGE_ME

[heater_fan hotend_fan]
pin: CHANGE_ME
heater: extruder
heater_temp: 50.0

# ============================================================
# 打印机运动学配置
# ============================================================
[printer]
kinematics: cartesian          # XYZ 笛卡尔（Y是旋转轴但Klipper内部按线性处理）
max_velocity: 200              # mm/s
max_accel: 1500                # mm/s^2
max_z_velocity: 10
max_z_accel: 100

# ============================================================
# 自定义G-code宏 — 纤维控制
# ============================================================

# T0: 切换到普通塑料头
[gcode_macro T0]
gcode:
    # 关闭纤维张力
    # 激活塑料挤出机
    SET_GCODE_VARIABLE MACRO=_cf_state VARIABLE=active VALUE=0
    RESPOND MSG="Switched to plastic head (T0)"

# T1: 切换到碳纤维头
[gcode_macro T1]
gcode:
    # 激活纤维送料系统
    SET_GCODE_VARIABLE MACRO=_cf_state VARIABLE=active VALUE=1
    RESPOND MSG="Switched to fiber head (T1)"

# M700: 设置纤维张力
# 用法: M700 T2.00 (设置张力为2N)
[gcode_macro M700]
gcode:
    {% set tension = params.T|default(2.0)|float %}
    # 将张力值映射到张力电机的PWM或步进控制
    # 具体实现取决于张力控制硬件
    SET_GCODE_VARIABLE MACRO=_cf_state VARIABLE=tension VALUE={tension}
    RESPOND MSG="Fiber tension set to {tension}N"

# M701: 剪切纤维
[gcode_macro M701]
gcode:
    # 触发剪切机构（舵机/气缸）
    # 具体引脚根据硬件设置
    # SET_SERVO SERVO=cutter ANGLE=90    # 剪切
    # G4 P500                             # 等待500ms
    # SET_SERVO SERVO=cutter ANGLE=0     # 复位
    SET_GCODE_VARIABLE MACRO=_cf_state VARIABLE=cuts VALUE={printer["gcode_macro _cf_state"].cuts + 1}
    RESPOND MSG="Fiber cut #{printer['gcode_macro _cf_state'].cuts}"

# M702: 设置纤维体积分数 Vf
[gcode_macro M702]
gcode:
    {% set vf = params.V|default(40)|int %}
    SET_GCODE_VARIABLE MACRO=_cf_state VARIABLE=vf VALUE={vf}
    RESPOND MSG="Fiber Vf set to {vf}%"

# 内部状态变量
[gcode_macro _cf_state]
variable_active: 0
variable_tension: 2.0
variable_vf: 40
variable_cuts: 0
gcode:
    RESPOND MSG="CF state: active={printer['gcode_macro _cf_state'].active} tension={printer['gcode_macro _cf_state'].tension}N cuts={printer['gcode_macro _cf_state'].cuts}"

# ============================================================
# 启动/结束宏
# ============================================================
[gcode_macro START_PRINT]
gcode:
    G28                        ; 归零所有轴
    M104 S{params.NOZZLE|default(240)}
    M140 S{params.BED|default(80)}
    M109 S{params.NOZZLE|default(240)}
    M190 S{params.BED|default(80)}
    G90                        ; 绝对坐标
    G21                        ; mm单位
    RESPOND MSG="Print started - CF lateral deposition mode"

[gcode_macro END_PRINT]
gcode:
    M104 S0                    ; 关喷头加热
    M140 S0                    ; 关热床
    G91                        ; 相对坐标
    G0 Z10 F600                ; 抬高10mm
    G90
    G28 X                      ; X归零
    M84                        ; 关电机
    RESPOND MSG="Print finished. Cuts: {printer['gcode_macro _cf_state'].cuts}"
